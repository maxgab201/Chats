<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena de IAs Gratuita - OpenRouter vs Nvidia NIM</title>
    <meta name="description" content="Compará respuestas de modelos de IA gratuitos de OpenRouter y NVIDIA NIM en tiempo real.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans flex flex-col h-screen overflow-hidden">

    <header class="bg-gray-900 border-b border-gray-800 p-4 shrink-0 shadow-md relative z-20">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="p-2 bg-gradient-to-br from-indigo-500 to-green-500 rounded-lg">
                    <i class="ph ph-cpu text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-green-400">
                        Arena de IAs
                    </h1>
                    <p class="text-[10px] text-gray-400">100% gratis · OpenRouter + NVIDIA NIM</p>
                </div>
            </div>

            <!-- Selectores de modelos -->
            <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto text-sm">
                <div class="flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-lg border border-indigo-900/50">
                    <i class="ph ph-robot text-indigo-400"></i>
                    <select id="or-model" class="bg-transparent text-gray-200 outline-none w-full md:w-52 truncate">
                        <optgroup label="Auto-Router Inteligente">
                            <option value="openrouter/free">Elegir mejor gratis automáticamente</option>
                        </optgroup>
                        <optgroup label="Modelos Gratuitos (:free)">
                            <option value="nvidia/nemotron-3-nano-30b-a3b:free">Nemotron 3 Nano 30B (Nvidia)</option>
                            <option value="nvidia/nemotron-nano-9b-v2:free">Nemotron Nano 9B v2 (Nvidia)</option>
                            <option value="nvidia/nemotron-3-super-120b-a12b:free">Nemotron 3 Super 120B (Nvidia)</option>
                            <option value="openai/gpt-oss-20b:free">GPT-OSS 20B (OpenAI)</option>
                            <option value="openai/gpt-oss-120b:free">GPT-OSS 120B (OpenAI)</option>
                            <option value="google/gemma-4-31b-it:free">Gemma 4 31B (Google)</option>
                            <option value="google/gemma-4-26b-a4b-it:free">Gemma 4 26B A4B (Google)</option>
                        </optgroup>
                    </select>
                </div>

                <div class="flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-lg border border-green-900/50">
                    <i class="ph ph-cpu text-green-400"></i>
                    <select id="nv-model" class="bg-transparent text-gray-200 outline-none w-full md:w-52 truncate">
                        <option value="meta/llama-3.1-8b-instruct">Llama 3.1 8B (Meta)</option>
                        <option value="meta/llama-3.1-70b-instruct">Llama 3.1 70B (Meta)</option>
                        <option value="meta/llama-3.3-70b-instruct">Llama 3.3 70B (Meta)</option>
                        <option value="nvidia/llama-3.1-nemotron-nano-8b-v1">Nemotron Nano 8B (Nvidia)</option>
                        <option value="nvidia/llama-3.3-nemotron-super-49b-v1.5">Nemotron Super 49B (Nvidia)</option>
                        <option value="nvidia/nemotron-mini-4b-instruct">Nemotron Mini 4B (Nvidia)</option>
                        <option value="mistralai/mixtral-8x7b-instruct-v0.1">Mixtral 8x7B (Mistral)</option>
                        <option value="mistralai/mistral-nemotron">Mistral Nemotron</option>
                        <option value="google/gemma-2-2b-it">Gemma 2 2B (Google)</option>
                        <option value="google/gemma-3n-e4b-it">Gemma 3n E4B (Google)</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 pb-32">
        <div id="chat-history" class="max-w-7xl mx-auto space-y-8">
            <div id="welcome-screen" class="flex flex-col items-center justify-center text-center mt-10 md:mt-20 text-gray-500 space-y-4">
                <div class="flex gap-4">
                    <i class="ph ph-robot text-5xl text-indigo-900"></i>
                    <i class="ph ph-cpu text-5xl text-green-900"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-400">Arena Lista y Segura</h2>
                <p class="max-w-md text-xs md:text-sm px-4">
                    Tu app usa el backend serverless de Vercel: sin errores de CORS y con tus claves de API ocultas en las variables de entorno.
                </p>
            </div>
        </div>
    </main>

    <div class="bg-gray-900/90 backdrop-blur-md border-t border-gray-800 p-4 absolute bottom-0 w-full z-20">
        <form id="chat-form" class="max-w-4xl mx-auto relative flex items-end gap-2">
            <textarea id="prompt-input" rows="2" placeholder="Probá un problema de las Olimpiadas OMA acá..."
                class="w-full bg-gray-950 border border-gray-700 rounded-2xl py-3 px-4 pr-14 text-sm md:text-base text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>

            <button type="submit" id="send-btn" class="absolute right-2 bottom-2 p-2.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl transition-colors">
                <i class="ph ph-paper-plane-right text-lg"></i>
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
