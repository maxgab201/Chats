<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena de IAs Gratuita - OpenRouter vs Nvidia NIM</title>
    <meta name="description" content="Compará respuestas de modelos de IA gratuitos de OpenRouter y NVIDIA NIM en tiempo real.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans flex flex-col h-screen overflow-hidden">

    <header class="bg-gray-900 border-b border-gray-800 p-4 shrink-0 shadow-md relative z-20">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="p-2 bg-gradient-to-br from-indigo-500 to-green-500 rounded-lg">
                    <i class="ph ph-cpu text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-green-400">
                        Arena de IAs
                    </h1>
                    <p class="text-[10px] text-gray-400">100% gratis · OpenRouter + NVIDIA NIM</p>
                </div>
            </div>

            <!-- Selectores de modelos (combobox con buscador, ver script.js) -->
            <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto text-sm">
                <div id="or-picker" class="model-picker relative flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-lg border border-indigo-900/50 w-full sm:w-64">
                    <i class="ph ph-robot text-indigo-400 shrink-0"></i>
                    <button type="button" id="or-picker-btn" class="flex-1 flex items-center justify-between gap-2 bg-transparent text-gray-200 text-left outline-none min-w-0">
                        <span id="or-picker-label" class="truncate"></span>
                        <i class="ph ph-caret-down text-xs text-gray-400 shrink-0"></i>
                    </button>
                </div>

                <div id="nv-picker" class="model-picker relative flex items-center gap-2 bg-gray-800 px-3 py-1.5 rounded-lg border border-green-900/50 w-full sm:w-64">
                    <i class="ph ph-cpu text-green-400 shrink-0"></i>
                    <button type="button" id="nv-picker-btn" class="flex-1 flex items-center justify-between gap-2 bg-transparent text-gray-200 text-left outline-none min-w-0">
                        <span id="nv-picker-label" class="truncate"></span>
                        <i class="ph ph-caret-down text-xs text-gray-400 shrink-0"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 pb-32">
        <div id="chat-history" class="max-w-7xl mx-auto space-y-8">
            <div id="welcome-screen" class="flex flex-col items-center justify-center text-center mt-10 md:mt-20 text-gray-500 space-y-4">
                <div class="flex gap-4">
                    <i class="ph ph-robot text-5xl text-indigo-900"></i>
                    <i class="ph ph-cpu text-5xl text-green-900"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-400">Arena Lista y Segura</h2>
                <p class="max-w-md text-xs md:text-sm px-4">
                    Tu app usa el backend serverless de Vercel: sin errores de CORS y con tus claves de API ocultas en las variables de entorno.
                </p>
            </div>
        </div>
    </main>

    <div class="bg-gray-900/90 backdrop-blur-md border-t border-gray-800 p-4 absolute bottom-0 w-full z-20">
        <form id="chat-form" class="max-w-4xl mx-auto relative flex items-end gap-2">
            <textarea id="prompt-input" rows="2" placeholder="Probá un problema de las Olimpiadas OMA acá..."
                class="w-full bg-gray-950 border border-gray-700 rounded-2xl py-3 px-4 pr-14 text-sm md:text-base text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>

            <button type="submit" id="send-btn" class="absolute right-2 bottom-2 p-2.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl transition-colors">
                <i class="ph ph-paper-plane-right text-lg"></i>
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
